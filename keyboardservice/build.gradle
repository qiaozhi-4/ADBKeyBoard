apply plugin: 'com.android.application'

android {
    namespace 'com.android.xg.key'
    compileSdk 33

    defaultConfig {
        applicationId 'com.android.xg.key'
        minSdk 21
        targetSdk 33
        versionCode 4
        versionName "3.1"
    }
    signingConfigs {
        release {
            storeFile file("../xg.jks")
            storePassword "123456"
            keyAlias "key0"
            keyPassword "123456"
            v1SigningEnabled true  // 强制开启 V1
            v2SigningEnabled true  // 强制开启 V2
        }
    }
    buildTypes {
        release {
            signingConfig signingConfigs.release
            minifyEnabled false
        }
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
}
